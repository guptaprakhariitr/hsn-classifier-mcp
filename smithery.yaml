# Smithery registry config — https://smithery.ai/docs/build/project-config/smithery-yaml
# This is an HTTP-transport MCP server; Smithery hosts the listing and proxies
# clients straight to our Cloudflare Workers endpoint.

name: hsn-classifier-mcp
displayName: HSN Classifier
description: |
  Look up Indian HSN / GST codes by product description or name. 4,676 entries embedded; runs entirely on Cloudflare Workers.
homepage: https://hsn-classifier-mcp.atlasword.workers.dev
repository: https://github.com/guptaprakhariitr/hsn-classifier-mcp
license: MIT
version: "0.1.0"

runtime: container

startCommand:
  type: http
  url: https://hsn-classifier-mcp.atlasword.workers.dev/mcp
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: API key (optional)
        description: |
          Bearer token from https://hsn-classifier-mcp.atlasword.workers.dev/upgrade.
          Leave blank for the anonymous free tier (~100 calls/month/IP).
    required: []
  exampleConfig:
    apiKey: ""
  commandFunction: |-
    (config) => ({
      type: "http",
      url: "https://hsn-classifier-mcp.atlasword.workers.dev/mcp",
      headers: config.apiKey ? { Authorization: `Bearer ${config.apiKey}` } : {}
    })

remote:
  type: http
  url: https://hsn-classifier-mcp.atlasword.workers.dev/mcp

categories:
  - finance
  - india
  - compliance
  - regulatory
tags:
  - hsn
  - gst
  - india
  - tax
  - classification
  - search


auth:
  type: bearer
  required: false
  description: |
    Optional. Anonymous free tier works for ~100 calls/month per IP. For higher
    quotas, grab a key from https://hsn-classifier-mcp.atlasword.workers.dev/upgrade and pass
    it as `Authorization: Bearer <key>`.
